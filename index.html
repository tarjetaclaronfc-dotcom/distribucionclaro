<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-Card Digital · Distribución Claro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css" />
</head>
<body>

    <main class="wrap">
        <section class="card">
            
            <header class="profile-header">
                <div class="main-brand">
                    <img src="img/logo7.png" alt="Claro" class="claro-logo-top">
                </div>

                <div class="avatar-container">
                    <img 
                        src="img/perfiles/default.avif" 
                        alt="Foto de perfil" 
                        id="profilePhoto"
                        class="profile-img"
                        onerror="this.src='img/perfiles/default.avif'"
                    >
                    <div class="status-indicator"></div>
                </div>

                <h1 class="name" id="profileName">Cargando...</h1>
                <p class="role" id="profileRole">Asesor Distribución</p>
                <p class="brand-subtitle">Distribución Tucumán</p>
            </header>

            <div class="action-grid">
                <a href="#" class="action-item" id="btnCall">
                    <div class="icon-circle">📞</div>
                    <span>Llamar</span>
                </a>
                <a href="javascript:void(0)" class="action-item" onclick="openQR()">
                    <div class="icon-circle">
                        <span class="qr-icon-inner">🔳</span>
                    </div>
                    <span>Mi QR</span>
                </a>
                <a href="#" class="action-item" id="btnWhatsappHeader">
                    <div class="icon-circle">💬</div>
                    <span>Chat</span>
                </a>
            </div>

            <button class="btn-save-contact" id="saveBtn" onclick="generateVCard()">
                👤 Guardar Contacto
            </button>

            <footer class="social-links">
                <p class="connect-text">CONTACTO DIRECTO</p>
                <div class="contact-icons">
                    <a href="#" id="btnWhatsappFooter" target="_blank" class="footer-icon">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
                    </a>
                    <a href="#" id="btnEmailFooter" class="footer-icon">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="Gmail">
                    </a>
                    <a href="https://interaccesorios.com.ar/" target="_blank" class="footer-icon">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c4/Globe_icon.svg" alt="Web" style="filter: invert(13%) sepia(90%) saturate(5432%) hue-rotate(354deg) brightness(91%) contrast(114%);">
                    </a>
                </div>
                <p class="legal-footer">Claro Argentina · © 2026</p>
            </footer>
        </section>
    </main>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQR()">&times;</span>
            <h3>Mi Código QR</h3>
            <p>Escaneame para ver mi perfil</p>
            <div id="qrcode"></div>
            <button class="btn-close-qr" onclick="closeQR()">Cerrar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
